name: CI
on:
  push:
    branches:
      - main
  pull_request:

env:
  CI: true

permissions:
  contents: write # to create release (changesets/action)
  id-token: write # required for provenance and OIDC publish
  pull-requests: write # to create pull request (changesets/action)

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          # Pinned below 11.12.0: that release's self-update logic crashes
          # (upstream bug pnpm/pnpm#12959, fix not yet merged).
          version: 11.13.1

      - uses: actions/setup-node@v7
        with:
          cache: pnpm
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Lint
        run: |-
          pnpm lint
          pnpm prettier --check src "*.ts"

      - name: Install Playwright
        if: github.event_name == 'pull_request'
        run: npx playwright install --with-deps

      - name: Run tests (Chrome)
        if: github.event_name == 'pull_request'
        run: pnpm test --browser chromium

      - name: Run tests (Firefox)
        if: github.event_name == 'pull_request'
        run: pnpm test --browser firefox

      - name: Run tests (WebKit)
        if: github.event_name == 'pull_request'
        run: pnpm test --browser webkit

      # Temporary until setup-node action comes with npm version that contains
      # OIDC setup by default.
      # Pinned below npm 12: its `npm view --json` now always returns an array
      # instead of a bare object, which breaks @changesets/cli's publish
      # precheck (it misreads already-published versions as unpublished and
      # crashes retrying the publish). Bump past 11 once @changesets/cli
      # supports the new shape.
      - name: Update npm
        if: github.repository == 'birchill/jpdict-idb' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm install -g npm@11

      - name: Create/update pull request or publish
        if: github.repository == 'birchill/jpdict-idb' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: changesets/action@v1
        with:
          commit: 'chore(release): publish'
          title: 'Publish next version'
          publish: pnpm ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
